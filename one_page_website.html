<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My One-Page Website</title>
</head>
<body>

    <nav>
        <a href="#home">Home</a> | 
        <a href="#gallery">Gallery</a> | 
        <a href="#video">Video</a> | 
        <a href="#contact">Contact</a>
    </nav>

    <hr>

    <section id="home">
        <h1>Welcome to My Website</h1>
        <p>This page is organized into a single-page layout using HTML bookmarks.</p>
    </section>

    <section id="gallery">
        <h2>Photo Gallery</h2>
        <img src="https://via.placeholder.com/200" alt="Placeholder 1">
        <img src="https://via.placeholder.com/200" alt="Placeholder 2">
    </section>

    <section id="video">
        <h2>Watch Our Video</h2>
        <iframe width="420" height="315" src="https://www.youtube.com/embed/tgbNymZ7vqY"></iframe>
    </section>

    <section id="contact">
        <h2>Contact Me</h2>
        <form>
            <label>Name:</label><br>
            <input type="text"><br>
            <label>Email:</label><br>
            <input type="email"><br><br>
            <button type="submit">Submit</button>
        </form>
    </section>

    <footer>
        <hr>
        <p>&copy; 2026 My One-Page Project</p>
    </footer>

</body>
</html>
