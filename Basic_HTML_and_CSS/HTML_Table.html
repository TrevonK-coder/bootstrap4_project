<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTML Table Assignment</title>
    <style>
        /* Optional: Adding a border so you can see the table structure clearly */
        table, th, td {
            border: 1px solid black;
            border-collapse: collapse;
            padding: 10px;
        }
    </style>
</head>
<body>

    <h1>My Custom HTML Table</h1>

    <table>
        <tr>
            <th>Cat Name</th>
            <th>Color</th>
            <th>Age</th>
        </tr>
        <tr>
            <td>Midnight</td>
            <td>Black</td>
            <td>3</td>
        </tr>
        <tr>
            <td>Ginger</td>
            <td>Orange</td>
            <td>5</td>
        </tr>
    </table>

</body>
</html>
