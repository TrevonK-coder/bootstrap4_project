<!DOCTYPE html>
<html lang="en">
<head>
    <title>Style Element Assignment</title>
    <meta charset="utf-8">
    
    <style>
        .My_Style {
            background-color: red;
            color: blue;
            text-decoration: underline;
            font-weight: bold;
            font-size: small;
        }
    </style>
</head>
<body>

    <div class="My_Style">
        <h1>This Heading Inherits My_Style</h1>
        <p>This paragraph is red with blue, bold, underlined text at a small size.</p>
    </div>

    <p>This paragraph is outside the styled div and remains normal.</p>

</body>
</html>
