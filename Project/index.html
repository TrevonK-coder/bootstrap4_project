<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Space Station | Resort</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 40px; line-height: 1.6; color: #333; }
        nav ul { list-style-type: none; padding: 0; display: flex; gap: 20px; }
        nav li { font-weight: bold; color: #1a73e8; cursor: pointer; }
        .logo { font-size: 1.5em; font-weight: bold; margin: 20px 0; display: block; }
        
        .gallery-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 15px; 
            margin-top: 20px; 
        }
        .gallery-grid img { 
            width: 100%; 
            height: 200px; 
            object-fit: cover; 
            border-radius: 8px; 
            border: 1px solid #ddd;
            background-color: #f0f0f0;
        }
        footer { margin-top: 50px; border-top: 1px solid #eee; padding-top: 10px; font-size: 0.9em; color: #777; }
    </style>
</head>
<body>

    <nav>
        <ul>
            <li>HOME</li>
            <li>GALLERY</li>
            <li>RESERVATIONS</li>
        </ul>
    </nav>

    <span class="logo">The Space Station</span>

    <div class="gallery-section">
        <h2>Gallery</h2>
        <p><strong>Click to Enlarge</strong></p>
        <p>We have several space launches departing daily, <em>book your flight today!</em></p>
        
        <div class="gallery-grid">
            <img src="Thumb/thumbnail_1.jpeg" alt="A high-resolution blue spiral galaxy swirling in deep space">
            <img src="Thumb/thumbnail_2.jpeg" alt="A robotic Mars rover exploring a red, rocky desert landscape">
            <img src="Thumb/thumbnail_3.jpeg" alt="Vibrant pink and blue nebula clouds forming a star cluster">
            <img src="Thumb/thumbnail_4.jpeg" alt="A space shuttle lifting off with a massive trail of fire and smoke">
            <img src="Thumb/thumbnail_5.jpeg" alt="An astronaut in a white suit performing a spacewalk above Earth">
            <img src="Thumb/thumbnail_6.jpeg" alt="A detailed view of the crescent moon against a black sky">
            <img src="Thumb/thumbnail_7.jpeg" alt="The icy rings of Saturn viewed from a close orbit">
            <img src="Thumb/thumbnail_8.jpeg" alt="The blue curve of Earth as seen from the International Space Station">
            <img src="Thumb/thumbnail_9.jpeg" alt="A circular space station orbiting a giant orange planet">
        </div>
    </div>

    <footer>
        www.thespacestation.space &nbsp; | &nbsp; &copy; 2026
    </footer>

</body>
</html>
