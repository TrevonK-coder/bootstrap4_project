<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Space Station | Resort</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 40px; line-height: 1.6; color: #333; }
        nav ul { list-style-type: none; padding: 0; display: flex; gap: 20px; }
        nav li { font-weight: bold; cursor: pointer; color: #1a73e8; }
        .logo { font-size: 1.5em; font-weight: bold; margin: 20px 0; display: block; }
        
        /* Gallery Grid Layout */
        .gallery-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 15px; 
            margin-top: 20px; 
        }
        .gallery-grid img { 
            width: 100%; 
            height: 200px; 
            object-fit: cover; 
            border-radius: 8px; 
            border: 1px solid #ddd;
            background-color: #f0f0f0;
        }

        .reservation-form { margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px; }
        footer { margin-top: 50px; border-top: 1px solid #eee; padding-top: 10px; font-size: 0.9em; color: #777; }
    </style>
</head>
<body>

    <nav>
        <ul>
            <li>HOME</li>
            <li>GALLERY</li>
            <li>RESERVATIONS</li>
        </ul>
    </nav>

    <span class="logo">The Space Station</span>

    <div class="gallery-section">
        <h2>Gallery</h2>
        <p><strong>Click to Enlarge</strong></p>
        <p>We have several space launches departing daily, <em>book your flight today!</em></p>
        
        <div class="gallery-grid">
            <img src="Thumb/thumbnail_1.jpg" alt="Space 1">
            <img src="Thumb/thumbnail_2.jpg" alt="Space 2">
            <img src="Thumb/thumbnail_3.jpg" alt="Space 3">
            <img src="Thumb/thumbnail_4.jpg" alt="Space 4">
            <img src="Thumb/thumbnail_5.jpg" alt="Space 5">
            <img src="Thumb/thumbnail_6.jpg" alt="Space 6">
            <img src="Thumb/thumbnail_7.jpg" alt="Space 7">
            <img src="Thumb/thumbnail_8.jpg" alt="Space 8">
            <img src="Thumb/thumbnail_9.jpg" alt="Space 9">
        </div>
    </div>

    <footer>
        www.thespacestation.space &nbsp; | &nbsp; &copy; 2026
    </footer>

</body>
</html>
